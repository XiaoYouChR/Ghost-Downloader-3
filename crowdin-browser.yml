project_id_env: CROWDIN_BROWSER_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: .
preserve_hierarchy: true

files:
  - source: /browser_extension/app/public/_locales/zh_CN/messages.json
    translation: /browser_extension/app/public/_locales/%locale%/messages.json
    languages_mapping:
      locale:
        en-US: en_US
        ja: ja
        ru: ru
        zh-TW: zh_TW
        zh-HK: zh_HK
        pt-BR: pt_BR
